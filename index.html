<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>La Ruta del Pintxo — Donostia</title>
<meta name="description" content="Guía personal de bares de pintxos, vermuterías y gintonerías en San Sebastián.">
<meta name="theme-color" content="#eef0e6">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<section class="hero">
  <button class="theme-toggle" id="theme-toggle" aria-label="Cambiar tema claro/oscuro">☾</button>
  <span class="hero-eyebrow">Donostia — guía de bares</span>
  <h1>LA RUTA<br>DEL PINTXO</h1>

  <div class="stat-row" id="stat-row"></div>
</section>

<div class="install-banner hidden" id="install-banner">
  <span id="install-text">Instala esta guía como app — la abres desde tu pantalla de inicio, sin conexión.</span>
  <div class="install-actions">
    <button class="install-btn hidden" id="install-btn">Instalar</button>
    <button class="install-dismiss" id="install-dismiss" aria-label="Cerrar aviso">✕</button>
  </div>
</div>

<div class="filter-group">
  <span class="filter-label mono">Zona</span>
  <nav class="filters" id="filters-zone"></nav>
</div>
<div class="filter-group">
  <span class="filter-label mono">Tipo</span>
  <nav class="filters" id="filters-type"></nav>
</div>

<div class="sort-row" id="sort-row">
  <div class="sort-toggle" id="sort-toggle">
    <button class="sort-btn" data-mode="prioridad" data-active="true">Prioridad</button>
    <button class="sort-btn" data-mode="cercania" data-active="false">Cerca de mí</button>
  </div>
  <button class="surprise-btn" id="surprise-btn">🎲 Sorpréndeme</button>
</div>
<div class="sort-status" id="sort-status"></div>

<main id="main"></main>

<footer>
  Guía personal · edítala en <a href="https://github.com/yosulin/pintxos-donosti" target="_blank" rel="noopener">GitHub</a> · instálala en tu móvil para llevarla sin conexión
</footer>

<div class="toast" id="toast" aria-live="polite"></div>

<script src="js/app.js"></script>
</body>
</html>
