<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>La Ruta del Pintxo — Donostia</title>
<meta name="description" content="Guía personal de bares de pintxos, vermuterías y gintonerías en San Sebastián.">
<meta name="theme-color" content="#eef0e6">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<section class="hero">
  <span class="hero-eyebrow">Donostia — guía de bares</span>
  <h1>LA RUTA<br>DEL PINTXO</h1>
  <div class="stat-row" id="stat-row"></div>
</section>

<div class="install-banner hidden" id="install-banner">
  <span id="install-text">Instala esta guía como app — la abres desde tu pantalla de inicio, sin conexión.</span>
  <div class="install-actions">
    <button class="install-btn hidden" id="install-btn">Instalar</button>
    <button class="install-dismiss" id="install-dismiss" aria-label="Cerrar aviso">✕</button>
  </div>
</div>

<main id="main"></main>

<footer>
  Guía personal · edítala en <a href="https://github.com/yosulin/pintxos-donosti" target="_blank" rel="noopener">GitHub</a> · instálala en tu móvil para llevarla sin conexión
</footer>

<div class="sheet-backdrop hidden" id="sheet-backdrop"></div>
<div class="sheet hidden" id="sheet">
  <div class="sheet-header">
    <span class="sheet-title" id="sheet-title"></span>
    <button class="sheet-close" id="sheet-close" aria-label="Cerrar">✕</button>
  </div>
  <div class="sheet-body" id="sheet-body"></div>
</div>

<nav class="dock" id="dock">
  <button class="dock-btn" id="dock-zone">
    <span class="dock-icon">📍</span><span class="dock-label" id="dock-zone-label">Zona</span>
  </button>
  <button class="dock-btn" id="dock-type">
    <span class="dock-icon">🍸</span><span class="dock-label" id="dock-type-label">Tipo</span>
  </button>
  <button class="dock-btn" id="dock-sort">
    <span class="dock-icon" id="dock-sort-icon">⇅</span><span class="dock-label" id="dock-sort-label">Prioridad</span>
  </button>
  <button class="dock-btn" id="dock-surprise">
    <span class="dock-icon">🎲</span><span class="dock-label">Sorpresa</span>
  </button>
  <button class="dock-btn" id="dock-theme">
    <span class="dock-icon" id="dock-theme-icon">☾</span><span class="dock-label">Tema</span>
  </button>
</nav>

<div class="toast" id="toast" aria-live="polite"></div>

<script src="js/app.js"></script>
</body>
</html>
